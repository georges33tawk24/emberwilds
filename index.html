<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#14100d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>EMBERWILDS</title>
    <!-- Google AdSense (async — never blocks the game boot; the service
         worker passes cross-origin requests straight through, uncached) -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3282682530093560"
      crossorigin="anonymous"
    ></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #14100d;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* fill notched/rounded displays edge to edge */
        position: fixed;
        inset: 0;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        /* Phaser's autoCenter margins own the centering — flex here would
           double-center the margined canvas and skew it off-axis.
           Sized ONLY by inset: 0 — pinning all four edges tracks the live
           viewport in every mode (Safari's collapsing chrome, installed PWA,
           AND element fullscreen). Explicit 100dvh here left a dead strip at
           the bottom in iPad fullscreen, where dvh doesn't track the
           fullscreen viewport. */
        position: fixed;
        inset: 0;
        overflow: hidden;
      }
      /* invisible probe measuring env(safe-area-inset-*) so the game can keep
         HUD/controls clear of notches while the canvas paints beneath them */
      #safe-probe {
        position: fixed;
        inset: 0;
        visibility: hidden;
        pointer-events: none;
        padding-top: env(safe-area-inset-top, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }

      /* Rotate-to-landscape prompt — this is a side-scrolling platformer, so on
         touch devices held in portrait we cover the letterboxed view with a
         polished prompt instead of showing black bars. In landscape the dynamic
         internal width matches the screen aspect and fills edge to edge. */
      #rotate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(120% 90% at 50% 40%, #241a13 0%, #14100d 70%);
        color: #f4e6cf;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        text-align: center;
        padding: 0 32px;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          display: flex;
        }
      }
      #rotate .phone {
        width: 66px;
        height: 116px;
        border: 5px solid #e8b45a;
        border-radius: 14px;
        position: relative;
        animation: rot 2.6s ease-in-out infinite;
        box-shadow: 0 0 24px rgba(232, 180, 90, 0.28);
      }
      #rotate .phone::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 7px;
        width: 20px;
        height: 4px;
        border-radius: 3px;
        background: #e8b45a;
        transform: translateX(-50%);
      }
      #rotate .title {
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: #e8b45a;
        text-transform: uppercase;
      }
      #rotate .sub {
        font-size: 14px;
        opacity: 0.78;
        line-height: 1.5;
        max-width: 280px;
      }
      @keyframes rot {
        0%,
        18% {
          transform: rotate(0deg);
        }
        50%,
        68% {
          transform: rotate(-90deg);
        }
        100% {
          transform: rotate(-90deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="safe-probe" aria-hidden="true"></div>
    <div id="rotate" aria-hidden="true">
      <div class="phone"></div>
      <div class="title">Rotate your device</div>
      <div class="sub">EMBERWILDS plays best in landscape — turn your phone sideways to begin.</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
